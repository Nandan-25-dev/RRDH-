<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up - RRDC&H</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group input[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            padding: 12px 20px;
            margin-top: 10px;
            transition: all 0.3s;
            font-size: 15px;
        }

        .form-group input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .form-group input[type="submit"]:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .form-footer p {
            color: #666;
            font-size: 14px;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .form-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        .info-box strong {
            color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 30px 20px;
            }

            .password-group {
                grid-template-columns: 1fr;
            }

            .form-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1>Admin Registration</h1>
                <p>Create your admin account to access the hospital management system</p>
            </div>

            <div id="message" class="message"></div>

            <div class="info-box">
                <strong>Note:</strong> Admin registration has been enabled. Please use strong passwords and ensure all information is accurate.
            </div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">👤 Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="username">👤 Username *</label>
                    <input type="text" id="username" name="username" required placeholder="johndoe" minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">✉️ Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="admin@hospital.com">
                </div>

                <div class="form-group">
                    <label for="role">👔 Role *</label>
                    <select id="role" name="role" required>
                        <option value="">Select a role</option>
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                        <option value="Doctor">Doctor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔐 Password *</label>
                    <div class="password-group">
                        <input type="password" id="password" name="password" required placeholder="Min 6 characters" minlength="6">
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password" minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <input type="submit" value="Create Admin Account">
                    <div class="loading" id="loading">Creating account</div>
                </div>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="/admin/login?tab=admin">Login here</a></p>
                <p style="margin-top: 10px; font-size: 12px; color: #999;">← <a href="/admin/login" style="color: #999;">Back to main login</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('Username must be at least 3 characters!', 'error');
                return;
            }

            showLoading(true);

            // Send signup request
            fetch('/api/admin/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fullName,
                    username,
                    email,
                    role,
                    password
                })
            })
            .then(response => response.json())
            .then(data => {
                showLoading(false);
                
                if (data.success) {
                    showMessage('✅ Account created successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/login?tab=admin';
                    }, 2000);
                } else {
                    showMessage('❌ ' + (data.error || 'Registration failed!'), 'error');
                }
            })
            .catch(error => {
                showLoading(false);
                showMessage('❌ Error: ' + error.message, 'error');
            });
        }

        function showMessage(msg, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.className = 'message ' + type;
            msgEl.style.display = 'block';
        }

        function showLoading(show) {
            const form = document.getElementById('signupForm');
            const loading = document.getElementById('loading');
            
            if (show) {
                form.style.display = 'none';
                loading.style.display = 'block';
            } else {
                form.style.display = 'block';
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
