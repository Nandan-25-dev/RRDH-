<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Signup — RRDC&H</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: hsl(218, 60%, 6%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      animation: orbF 8s ease-in-out infinite alternate;
    }
    .orb-1 { width:500px; height:500px; top:-15%; left:-10%; background:radial-gradient(circle, hsl(210,85%,55%), transparent 70%); animation-duration:10s; }
    .orb-2 { width:400px; height:400px; bottom:-10%; right:-8%; background:radial-gradient(circle, hsl(185,90%,50%), transparent 70%); animation-duration:12s; animation-delay:-4s; }
    @keyframes orbF { from{transform:translate(0,0) scale(1);} to{transform:translate(25px,35px) scale(1.07);} }

    .signup-card {
      position: relative;
      width: 480px;
      padding: 2.75rem 2.5rem;
      background: rgba(10,25,65,0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 24px;
      box-shadow: 0 24px 72px rgba(0,0,0,0.5), 0 0 60px rgba(59,130,246,0.12);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .logo-area {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.1);
      display: flex; align-items:center; justify-content:center;
      margin: 0 auto 0.8rem;
      font-size: 1.8rem;
      box-shadow: 0 0 24px rgba(59,130,246,0.3);
    }
    .logo-title { font-size: 1.3rem; font-weight: 800; color: #fff; }
    
    h2 { font-size:1.4rem; font-weight:700; color:#fff; margin: 0.5rem 0; }
    .sub { font-size:0.82rem; color:rgba(255,255,255,.45); margin-bottom:1.5rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.9rem; }
    .form-row.full { grid-template-columns: 1fr; }

    .form-group { margin-bottom: 0.9rem; }
    label { display:block; font-size:0.72rem; font-weight:600; color:rgba(255,255,255,.55); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.4rem; }
    
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.3); pointer-events:none; font-size:0.9rem; }
    
    input, select {
      width:100%; padding:0.68rem 1rem 0.68rem 2.6rem;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;
      color:#fff; font-family:inherit; font-size:0.9rem;
      outline:none; transition:all .2s;
    }
    input::placeholder { color:rgba(255,255,255,.25); }
    input:focus, select:focus { 
      border-color:hsl(210,85%,58%); 
      background:rgba(59,130,246,0.09); 
      box-shadow:0 0 0 3px rgba(59,130,246,0.18);
    }

    .btn-signup {
      width:100%; padding:0.85rem;
      border:none; border-radius:10px; cursor:pointer;
      background:linear-gradient(135deg, hsl(210,80%,48%), hsl(210,85%,58%));
      color:#fff; font-family:inherit; font-size:1rem; font-weight:700;
      letter-spacing:0.02em;
      box-shadow:0 4px 20px rgba(59,130,246,0.38);
      transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
      margin-top:0.8rem;
    }
    .btn-signup:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(59,130,246,0.55); }
    .btn-signup:active { transform:translateY(-1px); }

    .error-msg, .success-msg {
      display:none; margin-top:1rem;
      padding:.7rem 1rem;
      border-radius:8px;
      font-size:.85rem;
      text-align:center;
      animation:fadeIn .3s ease;
    }
    .error-msg { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.28); color:hsl(0,85%,75%); }
    .success-msg { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.28); color:hsl(142,85%,75%); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: rgba(255,255,255,.5);
    }
    .login-link a { color:hsl(210,85%,65%); text-decoration:none; font-weight:600; }
    .login-link a:hover { text-decoration:underline; }

    select option { background: hsl(218, 60%, 6%); }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="signup-card">
    <div class="logo-area">
      <div class="logo-ring">🦷</div>
      <div class="logo-title">RRDC&H</div>
    </div>

    <div style="text-align:center;">
      <h2>Create Account</h2>
      <p class="sub">Register as a patient to book appointments</p>
    </div>

    <form id="signupForm">
      <!-- Name Row -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="firstName" name="firstName" placeholder="First name" required/>
          </div>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="lastName" name="lastName" placeholder="Last name" required/>
          </div>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group form-row full">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" placeholder="Choose username" required/>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group form-row full">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" name="email" placeholder="your@email.com" required/>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group form-row full">
        <label for="phone">Phone Number</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <input type="tel" id="phone" name="phone" placeholder="9876543210" required/>
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="form-group form-row full">
        <label for="dob">Date of Birth</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 15h2m4 0h2"/></svg>
          <input type="date" id="dob" name="dob"/>
        </div>
      </div>

      <!-- Gender -->
      <div class="form-group form-row full">
        <label for="gender">Gender</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="6" r="3"/><path d="M12 9v12M18 20c0-2-1-4-3-5M6 20c0-2 1-4 3-5"/></svg>
          <select id="gender" name="gender">
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group form-row full">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter password" required/>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group form-row full">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required/>
        </div>
      </div>

      <button type="submit" class="btn-signup" id="signupBtn">Create Account</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg">Account created successfully! Redirecting...</div>
    </form>

    <div class="login-link">
      Already have an account? <a href="/admin/login">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('errorMsg');
      const success = document.getElementById('successMsg');
      
      err.style.display = 'none';
      success.style.display = 'none';

      // Validate passwords match
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        err.textContent = 'Passwords do not match!';
        err.style.display = 'block';
        return;
      }

      btn.textContent = 'Creating Account...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/patient/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            dateOfBirth: document.getElementById('dob').value || null,
            gender: document.getElementById('gender').value || null,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (data.success) {
          success.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/admin/login?registered=true';
          }, 2000);
        } else {
          err.textContent = data.error || 'Registration failed. Please try again.';
          err.style.display = 'block';
          btn.textContent = 'Create Account';
          btn.disabled = false;
        }
      } catch (error) {
        err.textContent = 'Server error. Please try again later.';
        err.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
